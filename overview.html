<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Projektübersicht | Drafty</title>
    <!-- Übernimm hier dein CSS aus dem originalen <style>-Bereich -->
    <style>
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: var(--font-ui); display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .overview-container { max-width: 800px; width: 100%; text-align: center; }
        .logo-large { width: 80px; height: 80px; margin-bottom: 20px; }
        .info-card { background: var(--bg-sidebar); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); margin: 30px 0; }
        .footer-link { color: var(--text-faint); text-decoration: none; display: flex; align-items: center; gap: 8px; margin-top: 50px; }
        .footer-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="overview-container">
    <img src="logo.png" alt="Logo" class="logo-large">
    <h1>Willkommen bei Drafty</h1>
    <p style="color: var(--text-dim);">Dein persönlicher No-Code Web-Builder.</p>

    <div class="info-card">
        <h3>Wie erstelle ich ein neues Projekt?</h3>
        <p>Klicke im Editor einfach auf den Button "Neue Seite", um loszulegen. Nutze die Bausteine in der linken Sidebar per Drag-and-Drop, um dein Layout aufzubauen.</p>
        <button class="tool-btn primary" onclick="window.location.href='index.html'">Editor starten</button>
    </div>
</div>

</html>
